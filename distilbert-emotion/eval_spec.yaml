# Eval contract for: DistilBERT on the Emotion dataset.
# Reference experiment #2 — a DIFFERENT task + metric (6-class, macro-F1),
# included to prove the standard generalises beyond a single paper.
spec_version: "1.0.0"
paper_id: "distilbert-emotion"
task: "emotion_classification"

metric_lib_version: "0.1.0"

dataset:
  hf_id: "dair-ai/emotion"
  config: "split"
  split: "validation"          # 2000 labelled examples, 6 classes
  version: "1.0.0"
  revision: "cab853a1dbdf4c42c2b3ef2173804746df8825fe"
  text_field: "text"
  label_field: "label"          # 0..5: sadness, joy, love, anger, fear, surprise

model:
  hf_id: "bhadresh-savani/distilbert-base-uncased-emotion"
  revision: "ce6f4ffcde7642ca2cac02381a16da38e5498ff7"

inference:
  seed: 42
  max_length: 256
  batch_size: 32

# Imbalanced multi-class → macro-F1 is the honest primary, accuracy secondary.
metrics:
  primary: "f1_macro"
  secondary: ["accuracy"]

baseline_scores:
  paper_reported:
    value: 0.938
    metric_variant: "accuracy (model card, test split)"
    source: "bhadresh-savani/distilbert-base-uncased-emotion model card"
  our_reproduce:
    value: null
    metric_variant: "f1_macro (eval_lib 0.1.0)"

reproduce_target:
  f1_macro: { min: 0.80, max: 0.95 }
