# Eval contract for: DistilBERT on SST-2
# Filled by a SURVEY member; consumed by an EXPERIMENT member.
# Immutable once a run exists — to change anything, bump `spec_version`.
spec_version: "1.0.0"
paper_id: "distilbert-sst2"
task: "sentiment_classification"

# Pin the metric library: scores are only comparable within one version.
metric_lib_version: "0.1.0"

dataset:
  hf_id: "stanfordnlp/sst2"
  config: null
  split: "validation"          # 872 labelled examples
  version: "2.0.0"             # human-facing pin (recorded in golden record)
  revision: "8d51e7e4887a4caaa95b3fbebbf53c0490b58bbb"  # real HF commit
  text_field: "sentence"
  label_field: "label"          # 0 = negative, 1 = positive

model:
  hf_id: "distilbert-base-uncased-finetuned-sst-2-english"
  revision: "714eb0fa89d2f80546fda750413ed43d93601a13"   # real HF commit

# Decoding / inference config — pinned because it moves the number.
inference:
  seed: 42
  max_length: 256
  batch_size: 32

metrics:
  primary: "accuracy"
  secondary: ["f1"]

# Keep the paper's number and our reproduce SEPARATE, with the metric
# variant spelled out — the two may use different BLEU/F1 tokenisations.
baseline_scores:
  paper_reported:
    value: 0.913
    metric_variant: "accuracy (GLUE dev, SST-2)"
    source: "DistilBERT, Sanh et al. 2019, Table 1"
  our_reproduce:
    value: null                # filled by reproduce run, do not hand-edit
    metric_variant: "accuracy (eval_lib 0.1.0)"

reproduce_target:
  accuracy: { min: 0.90, max: 0.92 }
